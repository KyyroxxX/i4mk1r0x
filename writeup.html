<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writeup Analysis — Kyrox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;600;800&family=Orbitron:wght@900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --bg: #1e1e2e;
      --bg-alt: #181825;
      --bg-crust: #11111b;
      --surface: #313244;
      --border: rgba(203, 166, 247, 0.2);
      --accent: #cba6f7;
      --accent-pink: #f5c2e7;
      --text: #cdd6f4;
      --text-dim: #9399b2;
      --text-bright: #f5e0dc;
      --radius: 16px;
      --glass: rgba(24, 24, 37, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --mesh-1: rgba(203, 166, 247, 0.15);
      --mesh-2: rgba(245, 194, 231, 0.1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    /* ── Custom Scrollbar ── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-crust); }
    ::-webkit-scrollbar-thumb {
      background: var(--surface);
      border-radius: 4px;
      border: 2px solid var(--bg-crust);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Mesh Background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-color: var(--bg-crust);
      background-image: 
        radial-gradient(at 0% 0%, var(--mesh-1) 0px, transparent 50%),
        radial-gradient(at 100% 0%, var(--mesh-2) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(243, 139, 168, 0.1) 0px, transparent 50%),
        radial-gradient(at 0% 100%, var(--mesh-1) 0px, transparent 50%);
      pointer-events: none;
      z-index: -2;
    }

    .scroll-progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent-pink));
      z-index: 10000;
      width: 0%;
      transition: width 0.1s ease-out;
      box-shadow: 0 0 10px var(--accent);
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 1rem 2rem;
      background: rgba(17, 17, 27, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 600;
      transition: all 0.3s;
    }

    .back-link:hover {
      transform: translateX(-5px);
      color: var(--accent-pink);
    }

    .container {
      max-width: 1000px;
      margin: 7rem auto 5rem;
      padding: 0 2rem;
    }

    .glass-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 4rem;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(203, 166, 247, 0.05) 0%, transparent 40%);
      pointer-events: none;
    }

    /* ── Markdown Content Styling ── */
    #content {
      color: var(--text);
    }

    #content h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      color: var(--text-bright);
      margin-bottom: 2rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    #content h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin: 4rem 0 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    #content h3 {
      font-size: 1.4rem;
      color: var(--accent-pink);
      margin: 2.5rem 0 1rem;
    }

    #content p {
      margin-bottom: 1.8rem;
      color: var(--text-dim);
      font-size: 1.1rem;
    }

    #content strong {
      color: #fff;
      font-weight: 600;
    }

    #content blockquote {
      border-left: 4px solid var(--accent);
      background: rgba(49, 50, 68, 0.3);
      padding: 1.5rem 2rem;
      margin: 2.5rem 0;
      border-radius: 0 12px 12px 0;
      font-style: italic;
      color: var(--text);
    }

    #content img {
      width: 100%;
      height: auto;
      border-radius: 16px;
      border: 1px solid var(--glass-border);
      margin: 3rem 0;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s ease;
      display: block;
    }

    #content img:hover {
      transform: scale(1.02);
    }

    #content ul, #content ol {
      margin-bottom: 1.8rem;
      padding-left: 1.5rem;
      color: var(--text-dim);
    }

    #content li {
      margin-bottom: 0.8rem;
    }

    #content hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 4rem 0;
    }

    /* ── Code Styling ── */
    pre[class*="language-"] {
      border-radius: 12px;
      margin: 2.5rem 0 !important;
      border: 1px solid var(--border) !important;
      background: #11111b !important;
      padding: 1.5rem !important;
    }

    code:not(pre code) {
      background: rgba(49, 50, 68, 0.5);
      color: var(--accent-pink);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
    }

    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 5rem 0;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--surface);
      border-radius: 50%;
      display: inline-block;
      position: relative;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    .loader::after {
      content: '';  
      box-sizing: border-box;
      position: absolute;
      left: 0;
      top: 0;
      background: var(--accent);
      width: 16px;
      height: 16px;
      transform: translate(-50%, 50%);
      border-radius: 50%;
    }

    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .load-text {
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      letter-spacing: 0.3em;
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .container { margin-top: 5rem; padding: 0 1rem; }
      .glass-card { padding: 2rem; border-radius: 16px; }
      #content h1 { font-size: 2.2rem; }
    }
  </style>
</head>

<body>
  <div class="scroll-progress" id="scroll-progress"></div>

  <nav>
    <a href="index.html" class="back-link">
      <i class="fa-solid fa-arrow-left"></i>
      <span>SYSTEM.EXIT()</span>
    </a>
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim);">
      ROOT@KYROX: ~ / WRITEUPS / <span id="nav-filename">ANALYSIS</span>
    </div>
  </nav>

  <div class="container">
    <div class="glass-card">
      <div id="content">
        <div class="loading-container">
          <span class="loader"></span>
          <span class="load-text">DECRYPTING DATA...</span>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>

  <script>
    // ── Dynamic Image Path Resolver ──
    function resolveImagePath(href, fileName) {
      if (!href) return href;
      // If absolute URL or already absolute path, return it
      if (href.startsWith('http') || href.startsWith('/')) return href;
      
      const dir = fileName.substring(0, fileName.lastIndexOf('/'));
      // Clean leading ./ if present
      let cleanHref = href.startsWith('./') ? href.substring(2) : href;
      
      // Return the correct relative path from root
      return `writeups/${dir}/${cleanHref}`;
    }

    async function loadWriteup() {
      const urlParams = new URLSearchParams(window.location.search);
      const fileName = urlParams.get('file');
      const contentDiv = document.getElementById('content');
      const navFilename = document.getElementById('nav-filename');

      if (!fileName) {
        contentDiv.innerHTML = '<h1 style="color: var(--accent-red)">ERROR: NO_FILE_SPECIFIED</h1>';
        return;
      }

      const machineName = fileName.split('/')[0].toUpperCase();
      navFilename.textContent = machineName;

      try {
        const response = await fetch(`writeups/${fileName}`);
        if (!response.ok) throw new Error('File not found');
        const markdown = await response.text();
        
        // Configure Marked with custom renderer
        const renderer = new marked.Renderer();
        renderer.image = function(href, title, text) {
          const resolvedHref = resolveImagePath(href, fileName);
          return `<img src="${resolvedHref}" alt="${text || ''}" title="${title || ''}">`;
        };

        contentDiv.innerHTML = marked.parse(markdown, { renderer });
        
        // Highlight Code
        Prism.highlightAll();
        
        // Update Title
        const h1 = contentDiv.querySelector('h1');
        if (h1) document.title = `${h1.innerText} — Kyrox Analysis`;

      } catch (err) {
        console.error(err);
        contentDiv.innerHTML = `
          <h1 style="color: var(--accent-red)">SYSTEM_FAILURE: 404</h1>
          <p>Target file <strong>${fileName}</strong> not found in the mainframe.</p>
        `;
      }
    }

    // Scroll Progress
    window.addEventListener('scroll', () => {
      const windowHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (window.scrollY / windowHeight) * 100;
      document.getElementById('scroll-progress').style.width = `${progress}%`;
    });

    loadWriteup();
  </script>
</body>

</html>
